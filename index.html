<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>樱奈 Sakurana</title>
<script src="./live2dcubismcore.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/dylanNew/live2d/webgl/Live2D/lib/live2d.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff0f5; color: #5a3e4b; font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif; height: 100vh; overflow: hidden; }
  .container { display: flex; height: 100vh; }
  .left { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; background: url('白天1.png?v=2') center center / cover no-repeat; }
  .left canvas { width: 100% !important; height: 100% !important; }
  .right { width: 380px; background: rgba(255,240,245,0.95); border-left: 1px solid #f0b0c8; overflow-y: auto; padding: 20px; position: absolute; top: 0; right: 0; bottom: 0; z-index: 55; transition: transform 0.3s, opacity 0.3s; box-shadow: -4px 0 16px rgba(224,160,184,0.15); }
  .right.collapsed { transform: translateX(100%); padding: 20px; overflow: hidden; opacity: 0; border: none; pointer-events: none; }
  .right::-webkit-scrollbar { width: 6px; }
  .right::-webkit-scrollbar-thumb { background: #f0b0c8; border-radius: 3px; }
  h1 { font-size: 22px; margin-bottom: 6px; color: #e8607a; }
  .subtitle { font-size: 12px; color: #c99; margin-bottom: 20px; }
  .section { margin-bottom: 18px; }
  .section-title { font-size: 13px; font-weight: 600; color: #e8607a; margin-bottom: 8px; padding-left: 8px; border-left: 3px solid #f08ca8; text-transform: uppercase; letter-spacing: 1px; }
  .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .btn-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 8px 10px; border-radius: 8px; border: 1px solid #f0b0c8;
    background: #fff5f8; color: #7a4e5e; font-size: 13px; cursor: pointer;
    transition: all 0.15s; user-select: none; position: relative; overflow: hidden;
  }
  .btn:hover { background: #ffe0ec; border-color: #e8607a; }
  .btn:active { transform: scale(0.96); }
  .btn.active { background: #f08ca8; border-color: #e8607a; color: #fff; }
  .btn .key {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 22px; height: 20px; padding: 0 5px;
    background: #fce4ec; border-radius: 4px; font-size: 11px;
    font-weight: 600; color: #e8607a; flex-shrink: 0;
  }
  .btn.active .key { background: rgba(255,255,255,0.3); color: #fff; }
  .status-bar {
    margin-top: 16px; padding: 10px 14px; background: #fff5f8; border-radius: 8px;
    font-size: 12px; color: #b08090; border: 1px solid #f0b0c8;
  }
  .status-bar .label { color: #e8607a; font-weight: 600; }
  .load-overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; background: rgba(255,240,245,0.95);
    z-index: 100; transition: opacity 0.5s;
  }
  .load-overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner { width: 48px; height: 48px; border: 4px solid #f0b0c8; border-top-color: #e8607a; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .load-text { font-size: 14px; color: #c99; }
  .load-progress { width: 200px; height: 4px; background: #f0b0c8; border-radius: 2px; margin-top: 12px; overflow: hidden; }
  .load-progress-bar { height: 100%; background: #f08ca8; border-radius: 2px; width: 0%; transition: width 0.3s; }
  .load-percent { font-size: 12px; color: #e8607a; margin-top: 6px; }
  .error-overlay {
    position: absolute; inset: 0; display: none; flex-direction: column;
    align-items: center; justify-content: center; background: rgba(255,240,245,0.95); z-index: 100;
  }
  .error-overlay.show { display: flex; }
  .error-text { font-size: 14px; color: #e8607a; text-align: center; max-width: 400px; line-height: 1.6; }
  .drag-hint { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); font-size: 12px; color: #e0a0b8; }

  /* Toggle button for right panel */
  #panelToggle { position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; border-radius: 8px; border: 1px solid #f0b0c8; background: rgba(255,240,245,0.85); color: #e8607a; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 60; transition: all 0.2s; }
  #panelToggle:hover { background: #ffe0ec; border-color: #e8607a; }

  /* Chat Panel */
  #chatPanel { position: absolute; bottom: 0; left: 0; right: 0; height: 220px; background: rgba(255,240,245,0.95); border-top: 1px solid #f0b0c8; display: flex; flex-direction: column; transition: height 0.3s; z-index: 50; }
  #chatPanel.collapsed { height: 32px; }
  #chatPanel.collapsed #chatMessages, #chatPanel.collapsed #chatInputArea { display: none; }
  #chatHeader { display: flex; justify-content: space-between; align-items: center; padding: 6px 12px; background: #fce4ec; font-size: 13px; font-weight: 600; color: #e8607a; flex-shrink: 0; }
  .chat-header-actions { display: flex; gap: 8px; align-items: center; }
  .chat-header-actions button { background: none; border: none; cursor: pointer; font-size: 14px; padding: 0 4px; color: #e8607a; }
  #chatMessages { flex: 1; overflow-y: auto; padding: 8px 12px; font-size: 13px; line-height: 1.5; }
  #chatMessages::-webkit-scrollbar { width: 4px; }
  #chatMessages::-webkit-scrollbar-thumb { background: #f0b0c8; border-radius: 2px; }
  .chat-msg { margin-bottom: 8px; max-width: 80%; }
  .chat-msg.user { margin-left: auto; text-align: right; }
  .chat-msg .bubble { display: inline-block; padding: 6px 10px; border-radius: 10px; word-break: break-word; }
  .chat-msg.user .bubble { background: #f08ca8; color: #fff; border-bottom-right-radius: 2px; }
  .chat-msg.ai .bubble { background: #fff5f8; color: #5a3e4b; border: 1px solid #f0b0c8; border-bottom-left-radius: 2px; }
  .chat-msg.ai .typing { opacity: 0.6; }
  #chatInputArea { display: flex; padding: 8px; gap: 6px; border-top: 1px solid #f0b0c8; flex-shrink: 0; }
  #chatInput { flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid #f0b0c8; background: #fff5f8; color: #5a3e4b; font-size: 13px; outline: none; min-height: 18px; max-height: 60px; overflow-y: auto; line-height: 1.4; word-break: break-word; }
  #chatInput:empty::before { content: attr(data-placeholder); color: #d0a0b0; pointer-events: none; }
  #chatInput:focus { border-color: #f08ca8; }
  #chatSendBtn { padding: 8px 16px; border-radius: 8px; border: none; background: #f08ca8; color: #fff; font-size: 13px; cursor: pointer; white-space: nowrap; }
  #chatSendBtn:disabled { opacity: 0.5; cursor: not-allowed; }
  #chatSendBtn:hover:not(:disabled) { background: #e8607a; }

  /* API Key Modal */
  .modal-overlay { display: none; }
</style>
</head>
<body>
<div class="container">
  <div class="left" id="canvasWrap">
    <div class="load-overlay" id="loadOverlay">
      <div class="spinner"></div>
      <div class="load-text">Loading 樱奈...</div>
      <div class="load-progress"><div class="load-progress-bar" id="progressBar"></div></div>
      <div class="load-percent" id="progressPercent">0%</div>
    </div>
    <div class="error-overlay" id="errorOverlay">
      <div class="error-text" id="errorText"></div>
    </div>
    <div class="drag-hint">Drag model to reposition / Scroll to resize</div>
    <button id="panelToggle" title="控制面板">⚙</button>
    <div id="chatPanel">
      <div id="chatHeader">
        <span>Chat</span>
        <div class="chat-header-actions">
          <button id="chatToggleBtn" title="Toggle Chat">▼</button>
        </div>
      </div>
      <div id="chatMessages"></div>
      <div id="chatInputArea">
        <div id="chatInput" contenteditable="true" data-placeholder="和樱奈说话..."></div>
        <button id="chatSendBtn">发送</button>
      </div>
    </div>
  </div>
  <div class="right collapsed" id="controls">
    <h1>樱奈</h1>
    <div class="subtitle">Sakurana Live2D</div>

    <div class="section">
      <div class="section-title">表情 Expressions</div>
      <div class="btn-grid three" id="expressionBtns">
        <button class="btn" data-key="1" data-action="expression" data-value="表情-星星眼"><span class="key">1</span>星星眼</button>
        <button class="btn" data-key="2" data-action="expression" data-value="表情-流泪"><span class="key">2</span>流泪</button>
        <button class="btn" data-key="3" data-action="expression" data-value="表情-爱心眼"><span class="key">3</span>爱心眼</button>
        <button class="btn" data-key="4" data-action="expression" data-value="表情-生气"><span class="key">4</span>生气</button>
        <button class="btn" data-key="5" data-action="expression" data-value="表情-脸黑"><span class="key">5</span>脸黑</button>
        <button class="btn" data-key="6" data-action="expression" data-value="表情-蚊香眼"><span class="key">6</span>蚊香眼</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">动作 Actions</div>
      <div class="btn-grid three" id="actionBtns">
        <button class="btn" data-key="7" data-action="action" data-param="Param81" data-label="ASMR"><span class="key">7</span>ASMR</button>
        <button class="btn" data-key="8" data-action="action" data-param="Param84" data-label="手柄手"><span class="key">8</span>手柄手</button>
        <button class="btn" data-key="9" data-action="action" data-param="Param85,Param87" data-label="抱捧花"><span class="key">9</span>抱捧花</button>
        <button class="btn" data-key="0" data-action="action" data-param="Param85" data-label="抱玩偶"><span class="key">0</span>抱玩偶</button>
        <button class="btn" data-key="q" data-action="action" data-param="Param82" data-label="拿话筒"><span class="key">Q</span>拿话筒</button>
        <button class="btn" data-key="w" data-action="action" data-param="Param83" data-label="比心手"><span class="key">W</span>比心手</button>
      </div>
      <div class="btn-grid" style="margin-top:6px">
        <button class="btn" data-key="e" data-action="toggle" data-param="Param88" data-label="玩偶眼睛"><span class="key">E</span>玩偶眼睛切换</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">耳朵 Ears</div>
      <div class="btn-grid three" id="earBtns">
        <button class="btn" data-key="r" data-action="ear" data-ear="垂耳兔" data-toggle="Param3" data-base="Param71"><span class="key">R</span>垂耳兔</button>
        <button class="btn" data-key="t" data-action="ear" data-ear="兔耳1" data-toggle="Param4" data-base="Param71"><span class="key">T</span>兔耳1</button>
        <button class="btn" data-key="y" data-action="ear" data-ear="兔耳2" data-toggle="Param78" data-base="Param71"><span class="key">Y</span>兔耳2</button>
        <button class="btn" data-key="u" data-action="ear" data-ear="猫耳" data-toggle="Param9" data-base="Param71"><span class="key">U</span>猫耳</button>
        <button class="btn" data-key="i" data-action="ear" data-ear="翅耳" data-toggle="Param15" data-base="Param71"><span class="key">I</span>翅耳</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">部件 Parts</div>
      <div class="btn-grid">
        <button class="btn" data-key="o" data-action="toggle" data-param="Param79" data-value="-1" data-label="光环关"><span class="key">O</span>光环关</button>
        <button class="btn" data-key="p" data-action="toggle" data-param="ParamBJ6,ParamBJ7,ParamBJ8,ParamBJ9" data-value="1" data-label="头饰关"><span class="key">P</span>头饰关</button>
        <button class="btn" data-key="a" data-action="toggle" data-param="ParamBJ4" data-label="拖尾"><span class="key">A</span>拖尾</button>
        <button class="btn" data-key="s" data-action="toggle" data-param="ParamBJ3" data-label="翅膀"><span class="key">S</span>翅膀</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">变形 Morph</div>
      <div class="btn-grid">
        <button class="btn" data-key="d" data-action="toggle" data-param="Param97" data-value="1" data-label="Q版"><span class="key">D</span>Q版</button>
        <button class="btn" data-key="f" data-action="toggle" data-param="Param97" data-value="0.5" data-label="幼版"><span class="key">F</span>幼版</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">飞头 Floating Head</div>
      <div class="btn-grid">
        <button class="btn" data-key="g" data-action="toggle" data-param="ParamBJ,ParamBJ2" data-label="无脖子"><span class="key">G</span>无脖子</button>
        <button class="btn" data-key="h" data-action="toggle" data-param="ParamBJ" data-label="有脖子"><span class="key">H</span>有脖子</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">其他 Others</div>
      <div class="btn-grid">
        <button class="btn" data-key="tab" data-action="reset"><span class="key">⇥</span>移除按键表情</button>
      </div>
    </div>

    <div class="status-bar">
      <span class="label">Status:</span> <span id="statusText">Waiting for model...</span>
    </div>
  </div>
</div>

<script>
const MODEL_PATH = './小兔猪/小兔猪.model3.json';

let app, model;
let modelBaseWidth, modelBaseHeight;
const toggleState = {};
let currentEar = null;
let currentExpression = null;
let currentAction = null;

let fakeProgress = 0;
let fakeTimer = null;

function startFakeProgress(target, speed) {
  if (fakeTimer) clearInterval(fakeTimer);
  fakeTimer = setInterval(() => {
    if (fakeProgress < target) {
      fakeProgress += speed;
      if (fakeProgress > target) fakeProgress = target;
      setProgress(Math.round(fakeProgress));
    } else {
      clearInterval(fakeTimer);
      fakeTimer = null;
    }
  }, 100);
}

async function init() {
  setProgress(0);
  startFakeProgress(8, 0.5);

  app = new PIXI.Application({
    width: window.innerWidth,
    height: window.innerHeight,
    backgroundAlpha: 0,
    resolution: window.devicePixelRatio || 1,
    autoDensity: true,
    resizeTo: document.getElementById('canvasWrap'),
  });
  document.getElementById('canvasWrap').appendChild(app.view);

  try {
    startFakeProgress(20, 0.3);
    model = await PIXI.live2d.Live2DModel.from(MODEL_PATH, { autoInteract: false }, e => {
      if (e.type === 'load') {
        const real = 20 + e.progress * 70;
        if (real > fakeProgress) {
          fakeProgress = real;
          setProgress(Math.round(fakeProgress));
        }
      }
    });
    startFakeProgress(95, 1);
    app.stage.addChild(model);

    modelBaseWidth = model.width / model.scale.x;
    modelBaseHeight = model.height / model.scale.y;
    resizeModel();

    enableMouseTracking();

    document.getElementById('loadOverlay').classList.add('hidden');
    fakeProgress = 100;
    setProgress(100);
    if (fakeTimer) { clearInterval(fakeTimer); fakeTimer = null; }
    setStatus('Model loaded - Use buttons or keyboard');

    // Hide watermark part
    try {
      model.internalModel.coreModel.setPartOpacityById('Part62', 0);
    } catch(e) {
      const parts = model.internalModel.coreModel._model.parts;
      for (let i = 0; i < parts.count; i++) {
        if (parts.ids[i] === 'Part62') {
          model.internalModel.coreModel.setPartOpacityByIndex(i, 0);
          break;
        }
      }
    }
    app.ticker.add(() => {
      try { model.internalModel.coreModel.setPartOpacityById('Part62', 0); } catch(e) {
        const parts = model.internalModel.coreModel._model.parts;
        for (let i = 0; i < parts.count; i++) {
          if (parts.ids[i] === 'Part62') { model.internalModel.coreModel.setPartOpacityByIndex(i, 0); break; }
        }
      }
    });

    window.addEventListener('resize', () => resizeModel());
    // Re-layout when chat panel toggles
    const chatObs = new ResizeObserver(() => resizeModel());
    chatObs.observe(document.getElementById('chatPanel'));
  } catch (e) {
    console.error(e);
    document.getElementById('loadOverlay').classList.add('hidden');
    document.getElementById('errorOverlay').classList.add('show');
    document.getElementById('errorText').innerHTML =
      'Failed to load model.<br><br>Please run a local server from the <code>littlerp</code> folder:<br><br>' +
      '<code style="background:#fce4ec;padding:4px 8px;border-radius:4px;">cd ~/Downloads/littlerp && python3 -m http.server 8080</code><br><br>' +
      'Then open <code>http://localhost:8080</code><br><br>' +
      '<span style="color:#c99;font-size:12px;">Error: ' + e.message + '</span>';
  }
}

function resizeModel() {
  if (!model || !app) return;
  const scaleX = (app.screen.width * 0.6) / modelBaseWidth;
  const scaleY = (app.screen.height * 0.9) / modelBaseHeight;
  const scale = Math.min(scaleX, scaleY);
  model.scale.set(scale);
  model.x = (app.screen.width - modelBaseWidth * scale) / 2;
  model.y = (app.screen.height - modelBaseHeight * scale) / 2;
}

function enableMouseTracking() {
  const wrap = document.getElementById('canvasWrap');
  wrap.addEventListener('mousemove', (e) => {
    if (!model) return;
    const rect = wrap.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    model.focus(x * app.screen.width, y * app.screen.height);
  });
}

function setStatus(text) {
  document.getElementById('statusText').textContent = text;
}

function setProgress(pct) {
  const bar = document.getElementById('progressBar');
  const label = document.getElementById('progressPercent');
  if (bar) bar.style.width = pct + '%';
  if (label) label.textContent = pct + '%';
}

function setParameter(id, value) {
  if (!model) return;
  try {
    model.internalModel.coreModel.setParameterValueById(id, value);
  } catch(e) {
    // fallback: iterate parameters
    const params = model.internalModel.coreModel._model.parameters;
    for (let i = 0; i < params.count; i++) {
      if (params.ids[i] === id) {
        model.internalModel.coreModel.setParameterValueByIndex(i, value);
        return;
      }
    }
  }
}

function getParameter(id) {
  if (!model) return 0;
  try {
    return model.internalModel.coreModel.getParameterValueById(id);
  } catch(e) {
    const params = model.internalModel.coreModel._model.parameters;
    for (let i = 0; i < params.count; i++) {
      if (params.ids[i] === id) {
        return model.internalModel.coreModel.getParameterValueByIndex(i);
      }
    }
    return 0;
  }
}

function handleAction(btn) {
  const action = btn.dataset.action;
  const key = btn.dataset.key;

  switch (action) {
    case 'expression': {
      const name = btn.dataset.value;
      if (currentExpression === name) {
        resetExpression();
        currentExpression = null;
        clearActiveInGroup('#expressionBtns');
        setStatus('Expression cleared');
      } else {
        resetExpression();
        setExpression(name);
        currentExpression = name;
        clearActiveInGroup('#expressionBtns');
        btn.classList.add('active');
        setStatus('Expression: ' + name.replace('表情-', ''));
      }
      break;
    }
    case 'action': {
      const params = btn.dataset.param.split(',');
      const actionKey = btn.dataset.param;
      const isActive = currentAction === actionKey;
      // Turn off current action first
      if (currentAction) {
        currentAction.split(',').forEach(p => setParameter(p, 0));
        clearActiveInGroup('#actionBtns');
      }
      if (isActive) {
        currentAction = null;
        setStatus(btn.dataset.label + ' off');
      } else {
        const customVal = btn.dataset.value !== undefined ? parseFloat(btn.dataset.value) : null;
        params.forEach(p => setParameter(p, customVal !== null ? customVal : 1));
        currentAction = actionKey;
        btn.classList.add('active');
        setStatus(btn.dataset.label + ' on');
      }
      break;
    }
    case 'toggle': {
      const params = btn.dataset.param.split(',');
      const customVal = btn.dataset.value !== undefined ? parseFloat(btn.dataset.value) : null;
      const stateKey = btn.dataset.param;
      const isOn = toggleState[stateKey];

      if (isOn) {
        params.forEach(p => setParameter(p, 0));
        toggleState[stateKey] = false;
        btn.classList.remove('active');
        setStatus(btn.dataset.label + ' off');
      } else {
        params.forEach(p => {
          const val = customVal !== null ? customVal : 1;
          setParameter(p, val);
        });
        toggleState[stateKey] = true;
        btn.classList.add('active');
        setStatus(btn.dataset.label + ' on');
      }
      break;
    }
    case 'ear': {
      const ear = btn.dataset.ear;
      const toggleParam = btn.dataset.toggle;
      const baseParam = btn.dataset.base;

      if (currentEar === ear) {
        setParameter(toggleParam, 0);
        setParameter(baseParam, 0);
        currentEar = null;
        clearActiveInGroup('#earBtns');
        setStatus('Ears reset');
      } else {
        // reset all ears first
        ['Param3','Param4','Param9','Param15','Param78'].forEach(p => setParameter(p, 0));
        setParameter(baseParam, -1);
        setParameter(toggleParam, 1);
        currentEar = ear;
        clearActiveInGroup('#earBtns');
        btn.classList.add('active');
        setStatus('Ears: ' + ear);
      }
      break;
    }
    case 'reset': {
      resetAll();
      setStatus('All effects reset');
      break;
    }
  }
}

function resetExpression() {
  // Reset expression-related params
  ['key_7','ParamLianHei2','ParamLianHei3','ParamLianHei','ParamLianHong',
   'ParamWenXiang','ParamXXY','ParamAXY','ParamSQ'].forEach(p => setParameter(p, 0));
}

function setExpression(name) {
  const exprMap = {
    '表情-星星眼': [['ParamLianHei3', -1], ['ParamXXY', 1]],

  };

}

// ========== Chat System ==========
const API_ENDPOINT = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? null  // 本地开发需要自行配置
  : '/api/chat';
const CHAT_MODEL = 'doubao-seed-2-0-mini-260428';
const TTS_ENDPOINT = '/api/tts';
let CHAT_SYSTEM_PROMPT = '';

// Load OC prompt from txt file (fallback to inline if fetch fails)
fetch('oc.txt').then(r => r.ok ? r.text() : '').then(t => {
  CHAT_SYSTEM_PROMPT = t || '你是樱奈（Sakurana），一只垂耳兔亚人。用中文回答，语气活泼可爱。';
}).catch(() => {
  CHAT_SYSTEM_PROMPT = '你是樱奈（Sakurana），一只垂耳兔亚人。用中文回答，语气活泼可爱。';
});

let chatHistory = [];
let isStreaming = false;
let executedTags = new Set();
let lipSyncTimer = null;
let currentAudio = null;
let ttsAbortController = null;

// Map expression tags to TTS emotion styles
const EXPRESSION_STYLE_MAP = {
  '表情-星星眼': 'excited', '表情-流泪': 'sad', '表情-爱心眼': 'lovey-dovey',
  '表情-生气': 'angry', '表情-脸黑': 'angry', '表情-蚊香眼': 'confused'
};

async function requestTTS(text) {
  if (ttsAbortController) ttsAbortController.abort();
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (!text || !TTS_ENDPOINT) return;

  // Determine style from current expression
  let style = 'cute'; // default
  if (currentExpression && EXPRESSION_STYLE_MAP[currentExpression]) {
    style = EXPRESSION_STYLE_MAP[currentExpression];
  }

  ttsAbortController = new AbortController();
  try {
    const resp = await fetch(TTS_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, style }),
      signal: ttsAbortController.signal
    });
    if (!resp.ok) return;
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    currentAudio.onplay = () => startLipSync();
    currentAudio.onended = () => { stopLipSync(); URL.revokeObjectURL(url); currentAudio = null; };
    currentAudio.onerror = () => { stopLipSync(); URL.revokeObjectURL(url); currentAudio = null; };
    await currentAudio.play();
  } catch (e) {
    if (e.name !== 'AbortError') console.error('[tts]', e);
  }
}

function startLipSync() {
  if (lipSyncTimer) return;
  lipSyncTimer = setInterval(() => {
    if (!model) return;
    const open = Math.random() * 0.8 + 0.2;
    setParameter('ParamMouthOpenY', open);
    setParameter('ParamMouthForm', Math.random() * 0.6 - 0.3);
  }, 120);
}

function stopLipSync() {
  if (lipSyncTimer) { clearInterval(lipSyncTimer); lipSyncTimer = null; }
  setParameter('ParamMouthOpenY', 0);
  setParameter('ParamMouthForm', 0);
}

// Action map: tag value -> function that sets model params and updates state
const ACTION_MAP = {
  expression: {
    '星星眼': () => { resetExpression(); setExpression('表情-星星眼'); currentExpression = '表情-星星眼'; },
    '流泪': () => { resetExpression(); setExpression('表情-流泪'); currentExpression = '表情-流泪'; },
    '爱心眼': () => { resetExpression(); setExpression('表情-爱心眼'); currentExpression = '表情-爱心眼'; },
    '生气': () => { resetExpression(); setExpression('表情-生气'); currentExpression = '表情-生气'; },
    '脸黑': () => { resetExpression(); setExpression('表情-脸黑'); currentExpression = '表情-脸黑'; },
    '蚊香眼': () => { resetExpression(); setExpression('表情-蚊香眼'); currentExpression = '表情-蚊香眼'; },
  },
  action: {
    'ASMR': () => { if(currentAction) currentAction.split(',').forEach(p=>setParameter(p,0)); setParameter('Param81',1); currentAction='Param81'; },
    '手柄手': () => { if(currentAction) currentAction.split(',').forEach(p=>setParameter(p,0)); setParameter('Param84',1); currentAction='Param84'; },
    '抱捧花': () => { if(currentAction) currentAction.split(',').forEach(p=>setParameter(p,0)); setParameter('Param85',1); setParameter('Param87',1); currentAction='Param85,Param87'; },
    '抱玩偶': () => { if(currentAction) currentAction.split(',').forEach(p=>setParameter(p,0)); setParameter('Param85',1); currentAction='Param85'; },
    '拿话筒': () => { if(currentAction) currentAction.split(',').forEach(p=>setParameter(p,0)); setParameter('Param82',1); currentAction='Param82'; },
    '比心手': () => { if(currentAction) currentAction.split(',').forEach(p=>setParameter(p,0)); setParameter('Param83',1); currentAction='Param83'; },
  },
  ear: {
    '垂耳兔': () => { ['Param3','Param4','Param9','Param15','Param78'].forEach(p=>setParameter(p,0)); setParameter('Param71',-1); setParameter('Param3',1); currentEar='垂耳兔'; },
    '兔耳1': () => { ['Param3','Param4','Param9','Param15','Param78'].forEach(p=>setParameter(p,0)); setParameter('Param71',-1); setParameter('Param4',1); currentEar='兔耳1'; },
    '兔耳2': () => { ['Param3','Param4','Param9','Param15','Param78'].forEach(p=>setParameter(p,0)); setParameter('Param71',-1); setParameter('Param78',1); currentEar='兔耳2'; },
    '猫耳': () => { ['Param3','Param4','Param9','Param15','Param78'].forEach(p=>setParameter(p,0)); setParameter('Param71',-1); setParameter('Param9',1); currentEar='猫耳'; },
    '翅耳': () => { ['Param3','Param4','Param9','Param15','Param78'].forEach(p=>setParameter(p,0)); setParameter('Param71',-1); setParameter('Param15',1); currentEar='翅耳'; },
  },
  toggle: {
    '光环关': () => setParameter('Param79', -1),
    '头饰关': () => { setParameter('ParamBJ6',1); setParameter('ParamBJ7',1); setParameter('ParamBJ8',1); setParameter('ParamBJ9',1); },
    '拖尾': () => setParameter('ParamBJ4', 1),
    '翅膀': () => setParameter('ParamBJ3', 1),
    'Q版': () => setParameter('Param97', 1),
    '幼版': () => setParameter('Param97', 0.5),
    '无脖子': () => { setParameter('ParamBJ',1); setParameter('ParamBJ2',1); },
    '有脖子': () => setParameter('ParamBJ', 1),
  }
};

function executeChatAction(type, value) {
  const map = ACTION_MAP[type];
  if (map && map[value]) {
    map[value]();
    updateButtonStates();
    setStatus('Chat: ' + type + ' → ' + value);
  }
}

function updateButtonStates() {
  document.querySelectorAll('.btn.active').forEach(b => b.classList.remove('active'));
  if (currentExpression) {
    const btn = document.querySelector('.btn[data-value="' + currentExpression + '"]');
    if (btn) btn.classList.add('active');
  }
  if (currentAction) {
    const btn = document.querySelector('.btn[data-param="' + currentAction + '"]');
    if (btn) btn.classList.add('active');
  }
  if (currentEar) {
    const btn = document.querySelector('.btn[data-ear="' + currentEar + '"]');
    if (btn) btn.classList.add('active');
  }
  Object.keys(toggleState).forEach(key => {
    if (toggleState[key]) {
      const btn = document.querySelector('.btn[data-param="' + key + '"]');
      if (btn) btn.classList.add('active');
    }
  });
}

function parseAndExecuteTags(text) {
  const regex = /\[(expression|action|ear|toggle):([^\]]+)\]/g;
  let match;
  while ((match = regex.exec(text)) !== null) {
    const tagKey = match[0];
    if (!executedTags.has(tagKey)) {
      executedTags.add(tagKey);
      executeChatAction(match[1], match[2]);
    }
  }
}

function stripTags(text) {
  return text.replace(/\[(expression|action|ear|toggle):[^\]]+\]/g, '').trim();
}

// Chat UI helpers
function appendChatMessage(role, text, isTyping) {
  const container = document.getElementById('chatMessages');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'chat-msg ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'bubble' + (isTyping ? ' typing' : '');
  bubble.textContent = text || '...';
  msgDiv.appendChild(bubble);
  container.appendChild(msgDiv);
  container.scrollTop = container.scrollHeight;
  return msgDiv;
}

function updateChatMessage(msgEl, text) {
  const bubble = msgEl.querySelector('.bubble');
  bubble.textContent = text || '...';
  if (text) bubble.classList.remove('typing');
  document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
}

async function sendMessage(userText) {
  if (!API_ENDPOINT) return;
  if (isStreaming) return;

  // Cancel any playing TTS audio from previous response
  if (ttsAbortController) ttsAbortController.abort();
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }

  appendChatMessage('user', userText);
  chatHistory.push({ role: 'user', content: userText });

  // Keep last 20 messages to avoid token overflow
  if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);

  isStreaming = true;
  document.getElementById('chatSendBtn').disabled = true;
  executedTags.clear();

  const aiMsgEl = appendChatMessage('ai', '', true);
  let fullText = '';

  try {
    const response = await fetch(API_ENDPOINT, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'text/event-stream'
      },
      body: JSON.stringify({
        model: CHAT_MODEL,
        messages: [
          { role: 'system', content: CHAT_SYSTEM_PROMPT },
          ...chatHistory
        ],
        stream: true,
        max_tokens: 1024,
        temperature: 0.7,
        reasoning_effort: 'minimal'
      })
    });

    if (!response.ok) {
      const errText = await response.text();
      throw new Error('API ' + response.status + ': ' + errText.slice(0, 200));
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let sseBuffer = '';
    let lipSyncStarted = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      console.log('[chat] chunk received, bytes:', value?.length);

      sseBuffer += decoder.decode(value, { stream: true });
      const lines = sseBuffer.split('\n');
      sseBuffer = lines.pop();

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || trimmed === ':') continue;
        if (!trimmed.startsWith('data: ') && !trimmed.startsWith('data:')) continue;
        const data = trimmed.startsWith('data: ') ? trimmed.slice(6) : trimmed.slice(5);
        if (data === '[DONE]') continue;
        try {
          const parsed = JSON.parse(data);
          // Try all possible delta content paths
          const delta = parsed.choices?.[0]?.delta?.content
            || parsed.choices?.[0]?.delta?.reasoning_content
            || parsed.choices?.[0]?.delta?.text
            || parsed.choices?.[0]?.message?.content
            || parsed.delta?.text;
          if (delta) {
            fullText += delta;
            parseAndExecuteTags(fullText);
            const displayText = stripTags(fullText);
            updateChatMessage(aiMsgEl, displayText);
          } else if (parsed.choices?.[0]?.finish_reason) {
            // stream done
          } else {
            console.log('[chat] unhandled SSE data:', JSON.stringify(parsed).slice(0, 300));
          }
        } catch (e) { /* incomplete JSON, skip */ }
      }
    }
  } catch (e) {
    updateChatMessage(aiMsgEl, 'Error: ' + e.message);
  }

  const cleanText = stripTags(fullText);
  chatHistory.push({ role: 'assistant', content: cleanText });

  isStreaming = false;
  document.getElementById('chatSendBtn').disabled = false;
  stopLipSync();

  // Request TTS and start audio-driven lip sync
  if (cleanText) requestTTS(cleanText);
}

// Chat input event handlers
document.getElementById('chatSendBtn').addEventListener('click', () => {

  if (text) { sendMessage(text); input.textContent = ''; }

});
